name: Build & Release GPA Calculator

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build debug APK
        # Explicitly setting the working directory to ensure Gradle finds settings.gradle
        working-directory: .
        run: |
          java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain clean assembleDebug --stacktrace

      # ── Signed release (only on tag push) ───────────────────────────────
      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Build signed release APK
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: .
        env:
          KEYSTORE_FILE:     app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain assembleRelease --stacktrace

      # ── Upload debug APK ─────────────────────────────────────────────────
      - name: Upload debug APK
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: GpaCalculator-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── Upload release APK + create GitHub Release ───────────────────────
      - name: Upload release APK artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: GpaCalculator-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          name: "GPA Calculator ${{ github.ref_name }}"
          body: |
            ## GPA Calculator ${{ github.ref_name }}
            - Signed release APK attached
            - Package: `com.bodybth.gpacalculator`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
