name: Build & Release GPA Calculator

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Build debug APK ───────────────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew clean assembleDebug --stacktrace

      # ── Signed release (only on tag push) ─────────────────────────────
      - name: Decode keystore
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Build signed release APK
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_FILE: app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ── Upload debug APK ─────────────────────────────────────────────
      - name: Upload debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: GpaCalculator-debug
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 30

      # ── Upload release APK ────────────────────────────────────────────
      - name: Upload release APK artifact
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: GpaCalculator-release
          path: "**/build/outputs/apk/release/*.apk"
          retention-days: 90

      # ── Create GitHub Release ─────────────────────────────────────────
      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: "**/build/outputs/apk/release/*.apk"
          name: GPA Calculator ${{ github.ref_name }}
          body: |
            ## GPA Calculator ${{ github.ref_name }}
            - Signed release APK attached
            - Package: `com.bodybth.gpacalculator`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
